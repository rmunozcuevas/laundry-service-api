openapi: 3.0.3
info:
  title: Laundry Service API
  version: 0.1.0
servers:
  - url: /
  - url: http://localhost:3000
tags:
  - name: Garments
    description: Operations related to Garments
  - name: Auth
    description: Operations related to Auth
  - name: Order
    description: Operations related to Orders
  - name: Subscriptions
    description: Operations related to Subscriptions
  - name: PricingTier
    description: Operations related to PricingTiers
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    GarmentId:
      name: id
      in: path
      required: true
      description: Garment ID
      schema:
        type: integer
        minimum: 1
        example: 1
    SearchParam:
      name: search
      in: query
      required: false
      description: Filter garments by matching type or care_instructions
      schema:
        type: string
        example: shirt
    SortByParam:
      name: sortBy
      in: query
      required: false
      description: Field to sort by
      schema:
        type: string
        enum:
          - id
          - type
          - care_instructions
          - delicate_flag
          - quantity
          - unit_price
        example: id
    OrderParam:
      name: order
      in: query
      required: false
      description: Sort direction
      schema:
        type: string
        enum:
          - asc
          - desc
        example: asc
    OffsetParam:
      name: offset
      in: query
      required: false
      description: Number of garments to skip
      schema:
        type: integer
        minimum: 0
        example: 0
    LimitParam:
      name: limit
      in: query
      required: false
      description: Max garments to return (1-50)
      schema:
        type: integer
        minimum: 1
        maximum: 50
        example: 5
    OrderId:
      name: id
      in: path
      required: true
      description: Order ID
      schema:
        type: integer
        minimum: 1
        example: 1
    OrderSearchParam:
      name: search
      in: query
      required: false
      description: Filter orders by matching status or pickup_date
      schema:
        type: string
        example: pending
    OrderSortByParam:
      name: sortBy
      in: query
      required: false
      description: Field to sort by
      schema:
        type: string
        enum:
          - id
          - userId
          - pickup_date
          - weight_kg
          - status
          - total_price
          - created_at
        example: created_at
    OrderOrderParam:
      name: order
      in: query
      required: false
      description: Sort direction
      schema:
        type: string
        enum:
          - asc
          - desc
        example: desc
    OrderOffsetParam:
      name: offset
      in: query
      required: false
      description: Number of orders to skip
      schema:
        type: integer
        minimum: 0
        example: 0
    OrderLimitParam:
      name: limit
      in: query
      required: false
      description: Max orders to return (1-50)
      schema:
        type: integer
        minimum: 1
        maximum: 50
        example: 5
  schemas:
    Garment:
      type: object
      required:
        - id
        - orderId
        - type
        - quantity
        - care_instructions
        - delicate_flag
        - unit_price
      properties:
        id:
          type: integer
          example: 12
        orderId:
          type: integer
          example: 5
        type:
          type: string
          example: Blue Shirt
        quantity:
          type: integer
          example: 2
        care_instructions:
          type: string
          example: Wash cold
        delicate_flag:
          type: boolean
          example: false
        unit_price:
          type: number
          example: 3.5
    GarmentCreate:
      type: object
      required:
        - orderId
        - type
        - quantity
        - care_instructions
        - delicate_flag
        - unit_price
      properties:
        orderId:
          type: integer
          example: 5
        type:
          type: string
          example: Blue Shirt
        quantity:
          type: integer
          example: 2
        care_instructions:
          type: string
          example: Wash cold
        delicate_flag:
          type: boolean
          example: false
        unit_price:
          type: number
          example: 3.5
    GarmentUpdate:
      type: object
      description: At least one field must be provided.
      properties:
        type:
          type: string
          example: Blue Shirt
        quantity:
          type: integer
          example: 2
        care_instructions:
          type: string
          example: Wash cold
        delicate_flag:
          type: boolean
          example: false
        unit_price:
          type: number
          example: 3.5
    ValidationError:
      type: object
      properties:
        errors:
          type: array
          items:
            type: string
      example:
        errors:
          - Id must be a positive integer
    Error:
      type: object
      properties:
        error:
          type: string
      example:
        error: Not Found
    Order:
      type: object
      required:
        - id
        - userId
        - pickup_date
        - weight_kg
        - status
        - total_price
        - created_at
      properties:
        id:
          type: integer
          example: 1
        userId:
          type: integer
          example: 10
        pickup_date:
          type: string
          description: Server-generated pickup date (YYYY-MM-DD)
          example: '2026-04-20'
        weight_kg:
          type: number
          example: 7.5
        status:
          type: string
          example: pending
        total_price:
          type: number
          example: 23.5
        created_at:
          type: string
          format: date-time
          example: '2026-04-18T16:30:00.000Z'
    OrderCreate:
      type: object
      required:
        - weight_kg
      properties:
        userId:
          type: integer
          description: Optional if using authentication; server should use the authenticated user.
          example: 10
        weight_kg:
          type: number
          example: 7.5
        status:
          type: string
          description: Optional; defaults to pending.
          example: pending
      description: pickup_date and total_price are server-generated.
    OrderUpdate:
      type: object
      description: At least one field must be provided. pickup_date and total_price are server-generated.
      properties:
        weight_kg:
          type: number
          example: 8
        status:
          type: string
          example: in_progress
    UserPublic:
      type: object
      required:
        - id
        - email
        - name
        - address
        - phone
        - role
      properties:
        id:
          type: integer
          example: 1
        email:
          type: string
          example: user@example.com
        name:
          type: string
          example: Jane Doe
        address:
          type: string
          example: 123 Laundry Lane
        phone:
          type: string
          example: 555-000-0000
        role:
          type: string
          example: customer
    SignUpRequest:
      type: object
      required:
        - email
        - password
        - name
        - address
        - phone
        - role
      properties:
        email:
          type: string
          example: user@example.com
        password:
          type: string
          example: password123
        name:
          type: string
          example: Jane Doe
        address:
          type: string
          example: 123 Laundry Lane
        phone:
          type: string
          example: 555-000-0000
        role:
          type: string
          example: customer
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          example: user@example.com
        password:
          type: string
          example: password123
    AuthTokenResponse:
      type: object
      required:
        - accessToken
      properties:
        accessToken:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
    PricingTier:
      type: object
      required:
        - id
        - min_weight_kg
        - max_weight_kg
        - base_price
        - extra_kg_price
      properties:
        id:
          type: integer
          example: 1
        min_weight_kg:
          type: number
          example: 0
        max_weight_kg:
          type: number
          example: 5
        base_price:
          type: number
          example: 15
        extra_kg_price:
          type: number
          example: 3
    PricingTierCreate:
      type: object
      required:
        - min_weight_kg
        - max_weight_kg
        - base_price
        - extra_kg_price
      properties:
        min_weight_kg:
          type: number
          example: 0
        max_weight_kg:
          type: number
          example: 5
        base_price:
          type: number
          example: 15
        extra_kg_price:
          type: number
          example: 3
    PricingTierUpdate:
      type: object
      description: At least one field must be provided.
      properties:
        min_weight_kg:
          type: number
          example: 1
        max_weight_kg:
          type: number
          example: 6
        base_price:
          type: number
          example: 18
        extra_kg_price:
          type: number
          example: 3.5
    Subscription:
      type: object
      required:
        - id
        - userId
        - plan
        - discount_percentage
        - active_flag
      properties:
        id:
          type: integer
          example: 1
        userId:
          type: integer
          example: 10
        plan:
          type: string
          example: basic
        discount_percentage:
          type: integer
          example: 10
        active_flag:
          type: boolean
          example: true
    SubscriptionCreate:
      type: object
      required:
        - plan
      properties:
        userId:
          type: integer
          description: Admin-only. Ignored for normal users.
          example: 10
        plan:
          type: string
          example: basic
        discount_percentage:
          type: integer
          description: Optional. Defaults to 0.
          example: 10
        active_flag:
          type: boolean
          description: Optional. Defaults to true.
          example: true
    SubscriptionUpdate:
      type: object
      description: At least one field must be provided.
      properties:
        plan:
          type: string
          example: premium
        discount_percentage:
          type: integer
          example: 15
        active_flag:
          type: boolean
          example: false
paths:
  /api/garments:
    get:
      tags:
        - Garments
      summary: List garments
      parameters:
        - $ref: '#/components/parameters/SearchParam'
        - $ref: '#/components/parameters/SortByParam'
        - $ref: '#/components/parameters/OrderParam'
        - $ref: '#/components/parameters/OffsetParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Garment'
        '400':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
        - bearerAuth: []
    post:
      tags:
        - Garments
      summary: Create a garment
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GarmentCreate'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Garment'
        '400':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/garments/{id}:
    get:
      tags:
        - Garments
      summary: Get garment by ID
      parameters:
        - $ref: '#/components/parameters/GarmentId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Garment'
        '400':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
        - bearerAuth: []
    put:
      tags:
        - Garments
      summary: Update garment by ID
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/GarmentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GarmentUpdate'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Garment'
        '400':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      tags:
        - Garments
      summary: Delete garment by ID
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/GarmentId'
      responses:
        '204':
          description: No Content
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/orders:
    get:
      tags:
        - Order
      summary: List orders
      parameters:
        - $ref: '#/components/parameters/OrderSearchParam'
        - $ref: '#/components/parameters/OrderSortByParam'
        - $ref: '#/components/parameters/OrderOrderParam'
        - $ref: '#/components/parameters/OrderOffsetParam'
        - $ref: '#/components/parameters/OrderLimitParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Order'
        '400':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
        - bearerAuth: []
    post:
      tags:
        - Order
      summary: Create an order
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderCreate'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/orders/{id}:
    get:
      tags:
        - Order
      summary: Get order by ID
      parameters:
        - $ref: '#/components/parameters/OrderId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
        - bearerAuth: []
    put:
      tags:
        - Order
      summary: Update order by ID
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrderId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderUpdate'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      tags:
        - Order
      summary: Delete order by ID
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrderId'
      responses:
        '204':
          description: No Content
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/auth/signup:
    post:
      tags:
        - Auth
      summary: Sign up
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignUpRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPublic'
        '400':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '409':
          description: Email already used
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/auth/login:
    post:
      tags:
        - Auth
      summary: Log in
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
        '400':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server misconfigured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/pricing-tiers:
    get:
      tags:
        - PricingTier
      summary: List pricing tiers
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
          description: Optional numeric search (matches numeric columns exactly)
        - name: sortBy
          in: query
          required: false
          schema:
            type: string
            enum:
              - id
              - min_weight_kg
              - max_weight_kg
              - base_price
              - extra_kg_price
        - name: order
          in: query
          required: false
          schema:
            type: string
            enum:
              - asc
              - desc
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PricingTier'
        '400':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
    post:
      tags:
        - PricingTier
      summary: Create a pricing tier (admin)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PricingTierCreate'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PricingTier'
        '400':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/pricing-tiers/{id}:
    get:
      tags:
        - PricingTier
      summary: Get pricing tier by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PricingTier'
        '400':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      tags:
        - PricingTier
      summary: Update pricing tier by ID (admin)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PricingTierUpdate'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PricingTier'
        '400':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      tags:
        - PricingTier
      summary: Delete pricing tier by ID (admin)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        '204':
          description: No Content
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/subscriptions:
    get:
      tags:
        - Subscriptions
      summary: List subscriptions (admin)
      security:
        - bearerAuth: []
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: sortBy
          in: query
          required: false
          schema:
            type: string
            enum:
              - id
              - userId
              - plan
              - discount_percentage
              - active_flag
        - name: order
